<!doctype html>
<html lang="pt-br">
  <head class="container">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Notícias</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/index.css" />
  </head>
  <body>
    <header class="container">
      <nav id="primary" class="grid grid-flow-col">
        <div>
          <img
            src="assets/icons/List.svg"
            width="20"
            height="20"
            alt="icone lista menu"
          />
          <strong>Menu</strong>
        </div>

        <div>
          <img src="assets/Logo.png" alt="logo do portal de notícias" />
        </div>

        <div>
          <strong>Buscar</strong>
          <img
            src="assets/icons/MagnifyingGlass.svg"
            alt="icone de busca"
            width="16.89"
            height="16.9"
          />
        </div>
      </nav>
      <nav id="secondary" class="grid grid-flow-col">
        <a href="#">Inteligência Artificial</a>
        <a href="#">Blockchain</a>
        <a href="#">Hologramas</a>
        <a href="#">Internet</a>
        <a href="#">Internet</a>
        <a href="#">Vestíveis</a>
        <a href="#">Realidade Aumentada</a>
        <a href="#">Realidade Virtual</a>
      </nav>
    </header>

    <main class="grid container">
      <section id="featured" class="grid grid-flow-col gap-16">
        <figure class="cards">
          <img src="assets/img/Image 01.png" alt="" />

          <figcaption>
            <span class="content-tag">Robótica</span>
            <h2 class="text-2xl">
              Robôs domésticos começam a ser adotados para tarefas diárias,
              prometendo mais conforto e eficiência nas residências.
            </h2>
          </figcaption>
        </figure>

        <figure class="grid grid-cols-2 gap-16">
          <div>
            <img src="assets/img/Image 02.png" alt="" />
          </div>

          <div>
            <img src="assets/img/Image 03.png" alt="" />
          </div>

          <div>
            <img src="assets/img/Image 04.png" alt="" />
          </div>

          <div>
            <img src="assets/img/Image 05.png" alt="" />
          </div>
        </figure>
      </section>
    </main>
  </body>
</html>
